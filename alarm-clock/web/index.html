<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Alarm Clock Config</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #ff6b6b; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
        header { padding: 1rem; background: var(--card); display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 1.25rem; }
        main { max-width: 720px; margin: 1rem auto; padding: 0 1rem; }
        section { background: var(--card); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        h2 { margin-top: 0; font-size: 1rem; }
        button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer; }
        input, select { width: 100%; padding: 0.5rem; margin: 0.25rem 0 0.75rem; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: var(--text); }
        .row { display: flex; gap: 0.5rem; align-items: center; }
        .row input, .row select { flex: 1; margin: 0; }
        .item { border: 1px solid #334155; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem; }
        .muted { color: #94a3b8; font-size: 0.875rem; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <header>
        <h1>Pi Alarm Clock Config</h1>
        <button id="revokeBtn" hidden>Revoke Pairing</button>
    </header>
    <main id="app">
        <p class="muted">Loading…</p>
    </main>
    <script src="/app.js"></script>
</body>
</html>
